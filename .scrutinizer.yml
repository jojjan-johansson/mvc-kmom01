build:
    image: default-bionic

    environment:
        php: '8.3'

    dependencies:
        before:
            - composer install --no-interaction

    tests:
        override:
            -
                command: composer phpunit

checks:
    php: true

filter:
    excluded_paths:
        - 'tests/*'
        - 'vendor/*'
        - 'var/*'
        - 'docs/*'